{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BatteryOptima | User Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00FFC6;
            --secondary: #10b981;
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: #e2e8f0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Background */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("{% static 'images/bg2.jpg' %}") no-repeat center center/cover;
            filter: brightness(0.3);
            z-index: -1;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0, 255, 198, 0.1) 0%, transparent 80%);
            z-index: -1;
        }

        /* Navbar (Minimal for Login) */
        nav {
            position: fixed; top: 0; width: 100%;
            padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo i { font-size: 1.5rem; }

        /* Login Container */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin-bottom: 0.5rem; text-align: center; color: #fff; }
        .login-card p { color: #94a3b8; text-align: center; margin-bottom: 2rem; font-size: 0.95rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: var(--primary); margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            padding: 0.9rem 1.2rem; border-radius: 12px; color: #fff; font-size: 1rem; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); outline: none; box-shadow: 0 0 10px rgba(0, 255, 198, 0.2); }

        .btn-login {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; padding: 1rem; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; border: none; font-family: 'Orbitron', sans-serif; transition: 0.3s; margin-top: 1rem;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 255, 198, 0.3); }

        .messages { list-style: none; margin-bottom: 1.5rem; }
        .messages li { background: rgba(239, 44, 44, 0.1); color: #f87171; padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; border: 1px solid rgba(239, 44, 44, 0.2); text-align: center; }

        .footer-links { margin-top: 2rem; text-align: center; font-size: 0.85rem; color: #94a3b8; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-links a:hover { text-decoration: underline; }

        /* Floating Light Effect */
        .light { position: absolute; width: 300px; height: 300px; background: var(--primary); filter: blur(150px); border-radius: 50%; opacity: 0.05; pointer-events: none; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="bg-gradient"></div>

    <nav>
        <a href="/" class="logo"><i class="fas fa-bolt"></i> BATTERYOPTIMA</a>
        <a href="/" style="color: #fff; text-decoration: none; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Home</a>
    </nav>

    <div class="login-card">
        <h1>USER ACCESS</h1>
        <p>Enter your credentials to manage battery health</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li><i class="fas fa-exclamation-circle"></i> {{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post" action="userLoginCheck">
            {% csrf_token %}
            <div class="form-group">
                <label for="userUsername">User ID</label>
                <input type="text" id="userUsername" name="userUsername" placeholder="e.g. john_doe" required>
            </div>
            <div class="form-group">
                <label for="userPassword">Password</label>
                <input type="password" id="userPassword" name="userPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">SYSTEM LOGIN</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="userRegisterForm">Initialize Registration</a>
        </div>
    </div>
</body>
</html>
/body>
</html>
