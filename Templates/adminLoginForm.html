{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BatteryOptima | Admin Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00D1FF;
            --secondary: #0055FF;
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.82);
            --border: rgba(0, 209, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: #e2e8f0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Background */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("{% static 'images/bg2.jpg' %}") no-repeat center center/cover;
            filter: brightness(0.2);
            z-index: -1;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(0, 31, 63, 0.5) 0%, rgba(2, 6, 23, 0.8) 100%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%;
            padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }

        /* Admin Card */
        .admin-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 3.5rem;
            border-radius: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 40px rgba(0, 209, 255, 0.15);
            position: relative;
            animation: emerge 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes emerge { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .admin-card h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; text-align: center; color: #fff; letter-spacing: 2px; }
        .admin-card p { color: #64748b; text-align: center; margin-bottom: 2.5rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; }

        .form-group { margin-bottom: 1.8rem; }
        .form-group label { display: block; color: var(--primary); margin-bottom: 0.6rem; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; }
        .form-group input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border);
            padding: 1rem 1.2rem; border-radius: 14px; color: #fff; font-size: 1rem; transition: 0.4s;
        }
        .form-group input:focus { border-color: #fff; background: rgba(0, 0, 0, 0.4); outline: none; box-shadow: 0 0 15px rgba(0, 209, 255, 0.2); }

        .btn-admin {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; padding: 1.1rem; border-radius: 14px; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; border: none; font-family: 'Orbitron', sans-serif; transition: 0.4s; margin-top: 1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn-admin:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 85, 255, 0.4); filter: brightness(1.1); }

        .messages { list-style: none; margin-bottom: 1.5rem; }
        .messages li { background: rgba(239, 68, 68, 0.15); color: #fca5a5; padding: 1rem; border-radius: 10px; font-size: 0.9rem; border: 1px solid rgba(239, 68, 68, 0.3); text-align: center; }

        .footer-memo { margin-top: 2.5rem; text-align: center; font-size: 0.75rem; color: #475569; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="bg-gradient"></div>

    <nav>
        <a href="/" class="logo"><i class="fas fa-shield-alt"></i> ADMIN TERMINAL</a>
        <a href="/" style="color: #64748b; text-decoration: none; font-size: 0.85rem; font-weight: 700;"><i class="fas fa-chevron-left"></i> ESCAPE TO HOME</a>
    </nav>

    <div class="admin-card">
        <h1>COMMAND ACCESS</h1>
        <p>Strategic Battery Fleet Management</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li><i class="fas fa-lock"></i> {{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post" action="adminLoginCheck">
            {% csrf_token %}
            <div class="form-group">
                <label for="adminUsername">ADMIN IDENTIFIER</label>
                <input type="text" id="adminUsername" name="adminUsername" placeholder="Enter ID" required>
            </div>
            <div class="form-group">
                <label for="adminPassword">ENCRYPTION KEY</label>
                <input type="password" id="adminPassword" name="adminPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-admin">AUTHENTICATE</button>
        </form>

        <div class="footer-memo">
            SECURE SESSION ENCRYPTED • VERSION 4.2.0
        </div>
    </div>
</body>
</html>
